<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password | TTTTI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); display: grid; place-items: center; padding: 24px; }
    .card { background: #fff; border-radius: 20px; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    h2 { font-size: 1.6rem; color: #0f172a; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 24px; }
    .field { display: grid; gap: 8px; margin-bottom: 18px; }
    label { font-weight: 700; font-size: .9rem; color: #0f172a; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; top: 50%; left: 14px; transform: translateY(-50%); color: #94a3b8; }
    input { width: 100%; padding: 13px 14px 13px 42px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; font-size: .95rem; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 999px; background: linear-gradient(135deg,#2563eb,#1d4ed8); color: #fff; font-weight: 800; font-size: .95rem; cursor: pointer; margin-top: 8px; }
    .btn:hover { filter: brightness(1.05); }
    .alert { padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: .9rem; }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #2563eb; text-decoration: none; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2><i class="fas fa-lock"></i> Change Password</h2>
    <p>Update your account password below.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="field">
        <label for="current_password">Current Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input id="current_password" type="password" name="current_password" required placeholder="Current password">
        </div>
      </div>
      <div class="field">
        <label for="new_password">New Password</label>
        <div class="input-wrap">
          <i class="fas fa-key"></i>
          <input id="new_password" type="password" name="new_password" required placeholder="At least 8 characters">
        </div>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm New Password</label>
        <div class="input-wrap">
          <i class="fas fa-key"></i>
          <input id="confirm_password" type="password" name="confirm_password" required placeholder="Repeat new password">
        </div>
      </div>
      <button type="submit" class="btn"><i class="fas fa-save"></i> Update Password</button>
    </form>
    <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> Go back</a>
  </div>
</body>
</html>
