<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>500 — Server Error</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family:'Segoe UI',sans-serif; background:#f4f4f4; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .box { background:#fff; border-radius:12px; padding:48px 40px; text-align:center; max-width:480px; box-shadow:0 4px 20px rgba(0,0,0,.1); }
    .icon { font-size:56px; color:#e53935; margin-bottom:16px; }
    h1 { font-size:22px; color:#333; margin-bottom:8px; }
    p  { color:#666; font-size:14px; margin-bottom:24px; }
    .detail { background:#ffebee; color:#c62828; border-radius:6px; padding:10px 14px; font-size:12px; font-family:monospace; text-align:left; margin-bottom:24px; word-break:break-all; }
    a { display:inline-block; padding:10px 24px; background:#1e5a9f; color:#fff; border-radius:6px; text-decoration:none; font-size:14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
    <h1>500 — Server Error</h1>
    <p>Something went wrong on our end. Please try again or contact your administrator.</p>
    {% if error %}
    <div class="detail">An unexpected error occurred. Details have been logged for administrators.</div>
    {% endif %}
    <a href="/"><i class="fas fa-home"></i> Go Home</a>
  </div>
</body>
</html>
